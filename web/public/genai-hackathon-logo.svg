<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 68" width="380" height="68">
  <!-- Green background -->
  <rect width="300" height="68" fill="#50e75f" rx="3"/>
  <!-- Black year box -->
  <rect x="300" y="0" width="80" height="68" fill="#111" rx="3"/>

  <!-- "GenAI Zürich" small label, top-left -->
  <text x="14" y="26" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="500" fill="#000" letter-spacing="0.3">GenAI Zürich</text>

  <!-- "Hackathon" large bold, filling the green zone -->
  <text x="14" y="58" font-family="'Arial Black', 'Arial Bold', Arial, sans-serif" font-size="36" font-weight="900" fill="#000" letter-spacing="-1">Hackathon</text>

  <!-- Year in the black box -->
  <text x="340" y="44" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#fff" text-anchor="middle">2026</text>
</svg>
