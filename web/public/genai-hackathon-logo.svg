<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 72" width="340" height="72">
  <!-- Green background -->
  <rect width="340" height="72" fill="#50e75f" rx="4"/>

  <!-- "GenAI Zürich" small text top-left area -->
  <text x="16" y="28" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="400" fill="#000">GenAI Zürich</text>

  <!-- "Hackathon" large bold text -->
  <text x="16" y="60" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="34" font-weight="900" fill="#000" letter-spacing="-0.5">Hackathon</text>

  <!-- Black box for year -->
  <rect x="258" y="8" width="70" height="56" fill="#000" rx="2"/>
  <text x="293" y="47" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#fff" text-anchor="middle">2026</text>
</svg>
